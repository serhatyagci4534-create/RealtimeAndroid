name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/example/realtimeapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          cat > settings.gradle << 'SETTEOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "RealtimeAndroidApp"
          include ':app'
          SETTEOF

          cat > build.gradle << 'BUILDEOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          BUILDEOF

          cat > app/build.gradle << 'APPEOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.realtimeapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.realtimeapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
              implementation("com.squareup.okhttp3:okhttp:4.12.0")
          }
          APPEOF

          cat > gradle.properties << 'PROPEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          PROPEOF

          cat > app/src/main/AndroidManifest.xml << 'MANEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Realtime App" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANEOF

          cat > app/src/main/res/layout/activity_main.xml << 'LAYEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical">
              <TextView android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Yukleniyor..."
                  android:textSize="16sp"
                  android:padding="12dp"/>
              <WebView android:id="@+id/webView"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"/>
          </LinearLayout>
          LAYEOF

          cat > app/src/main/java/com/example/realtimeapp/MainActivity.kt << 'KTEOF'
          package com.example.realtimeapp
          import android.annotation.SuppressLint
          import android.os.Bundle
          import android.webkit.*
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import okhttp3.*
          import kotlin.concurrent.thread
          class MainActivity : AppCompatActivity() {
              private val client = OkHttpClient()
              @SuppressLint("SetJavaScriptEnabled")
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val webView = findViewById<android.webkit.WebView>(R.id.webView)
                  val statusText = findViewById<TextView>(R.id.statusText)
                  webView.webViewClient = WebViewClient()
                  webView.webChromeClient = WebChromeClient()
                  webView.settings.javaScriptEnabled = true
                  webView.settings.domStorageEnabled = true
                  webView.loadUrl("https://studio--studio-786783784-cb7fe.us-central1.hosted.app/")
                  thread {
                      while (true) {
                          try {
                              val req = Request.Builder().url("https://studio--studio-786783784-cb7fe.us-central1.hosted.app/").build()
                              val resp = client.newCall(req).execute()
                              val len = resp.body?.string()?.length
                              runOnUiThread { statusText.text = "Baglanti Aktif | Boyut: $len" }
                              Thread.sleep(5000)
                          } catch (e: Exception) {
                              runOnUiThread { statusText.text = "Hata: ${e.message}" }
                          }
                      }
                  }
              }
          }
          KTEOF

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
